name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lsp
      - name: Read Lux repository ref
        id: lux-ref
        shell: bash
        run: echo "ref=$(cat lsp/.github/lux-ref)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: TimeWatcher/lux
          ref: ${{ steps.lux-ref.outputs.ref }}
          path: lux
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Prepare sibling path dependencies
        shell: bash
        run: |
          ln -s lux/compiler compiler
      - name: Test workspace
        run: cargo test --workspace --locked
        working-directory: lsp

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lsp
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lsp/vscode-lux/package-lock.json
      - name: Install extension dependencies
        working-directory: lsp/vscode-lux
        run: npm ci
      - name: Compile extension
        working-directory: lsp/vscode-lux
        run: npm run compile
      - name: Package extension
        working-directory: lsp/vscode-lux
        run: npm run package
