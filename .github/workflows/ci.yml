name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lux-lsp
      - uses: actions/checkout@v4
        with:
          repository: TimeWatcher/lux
          path: lux
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Prepare sibling compiler dependency
        shell: bash
        run: ln -s lux/compiler compiler
      - name: Test workspace
        run: cargo test --workspace --locked
        working-directory: lux-lsp

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lux-lsp
      - uses: actions/checkout@v4
        with:
          repository: TimeWatcher/lux
          path: lux
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lux-lsp/vscode-lux/package-lock.json
      - name: Prepare sibling compiler dependency
        shell: bash
        run: ln -s lux/compiler compiler
      - name: Install extension dependencies
        working-directory: lux-lsp/vscode-lux
        run: npm ci
      - name: Compile extension
        working-directory: lux-lsp/vscode-lux
        run: npm run compile
      - name: Package extension
        working-directory: lux-lsp/vscode-lux
        run: npm run package
